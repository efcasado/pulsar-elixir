[tools]
elixir = "1.20"
erlang = "29.0"
protoc = "25.1"

[env]
PULSAR_PROTOCOL = "v5.0.0-M1"

# Core development tasks
[tasks.deps]
description = "Get Elixir dependencies"
run = "mix deps.get"
sources = ["mix.lock"]

# Protobuf tasks
[tasks."proto:download"]
description = "Download Pulsar protobuf definitions"
run = "curl -o pulsar.proto https://raw.githubusercontent.com/apache/pulsar/refs/tags/{{env.PULSAR_PROTOCOL}}/pulsar-common/src/main/proto/PulsarApi.proto"

[tasks."proto:build-plugin"]
description = "Build protoc-gen-elixir escript from the local :protobuf dependency"
run = "cd deps/protobuf && mix deps.get && mix escript.build"
depends = ["deps"]

[tasks."proto:generate"]
description = "Generate Elixir code from protobuf"
run = [
    "protoc --plugin=./deps/protobuf/protoc-gen-elixir pulsar.proto --elixir_out=./lib --elixir_opt=package_prefix=pulsar.protocol.binary",
    "mv lib/pulsar/protocol/binary/pulsar/proto/pulsar.pb.ex lib/pulsar/protocol/binary.ex",
    "rm -rf lib/pulsar/protocol/binary/pulsar"
]
depends = ["proto:download", "proto:build-plugin"]

[tasks.setup]
description = "Setup development environment"
run = []
depends = ["proto:download", "proto:generate"]